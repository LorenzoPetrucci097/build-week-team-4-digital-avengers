<style>
  html, body, #root { height: 100%; }
  body { background: #020617; color: #f1f5f9; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  /* thin scrollbars, dark */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #020617; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #334155; }

  .font-mono, code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Cascadia Mono", Consolas, "Liberation Mono", monospace; }

  /* cursor blink, slower than pulse */
  @keyframes da-blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
  .da-blink { animation: da-blink 1.05s steps(1) infinite; }

  /* soft pulse dot */
  @keyframes da-pulse-dot {
    0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.55); }
    70% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  }
  .da-pulse-dot { animation: da-pulse-dot 1.8s infinite; }

  /* stagger fade-in — default state is VISIBLE so content renders even if animation is paused/never fires */
  @keyframes da-rise { from { transform: translateY(8px); } to { transform: translateY(0); } }
  .da-rise { opacity: 1; animation: da-rise 380ms cubic-bezier(.22,.61,.36,1) both; }

  /* spinner for search */
  @keyframes da-spin { to { transform: rotate(360deg); } }
  .da-spin { animation: da-spin 0.8s linear infinite; }

  /* subtle grid background for hero */
  .da-grid-bg {
    background-image:
      linear-gradient(rgba(148,163,184,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  /* hide horizontal scrollbar on roadmap track */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
</style>
</head>
